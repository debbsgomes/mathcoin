version: "3.8"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - BIND_ADDRESS=0.0.0.0:3000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mathcoin
      POSTGRES_PASSWORD: mathcoin
      POSTGRES_DB: mathcoin_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathcoin -d mathcoin_dev"]
      interval: 2s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
